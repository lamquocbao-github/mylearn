services:
  - type: web
    name: mylearn-backend
    runtime: python
    rootDir: backend
    buildCommand: python3 -m venv venv && venv/bin/pip install -r requirements.txt
    startCommand: venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT
    disk:
      name: mylearn-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: DB_PATH
        value: /data/mylearn.db
